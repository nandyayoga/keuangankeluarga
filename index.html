<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💰 KEUANGAN KELUARGA (Pro Dashboard)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; background: #f9fafb; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-thumb { background: #aaa; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCGu27iPkpJ5_l0-_vaxUy1EpCofLzT1yg",
      authDomain: "keuangan-keluarga-bfedc.firebaseapp.com",
      databaseURL: "https://keuangan-keluarga-bfedc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "keuangan-keluarga-bfedc",
      storageBucket: "keuangan-keluarga-bfedc.firebasestorage.app",
      messagingSenderId: "1089257207734",
      appId: "1:1089257207734:web:60d64302720dff0b703317"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const { useState, useEffect, useMemo, useRef } = React;

    const EXPENSE_CATS = ["Cicilan Rumah","Tabungan","Beban Bulanan","Belanja Rumah Tangga","Nafkah Istri","Biaya Entertainment","Orang Tua","Biaya Transportasi","Sedekah/Zakat","Kesehatan","Penunjang kerja suami","Kebutuhan Pribadi Istri","Lainnya"];
    const INCOME_CATS = ["Gaji","Pendapatan Lainnya"];
    const TRANSFER_CATS = ["Pindah Ke Suami","Pindah Ke Istri"];
    const PICs = ["Bersama","Suami","Istri"];

    const fmt = (n) => new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",minimumFractionDigits:0}).format(n||0);
    const toNum = (s) => parseFloat(String(s).replace(/[^0-9.-]/g,""))||0;

    function App() {
      const [entries, setEntries] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [activeTab, setActiveTab] = useState("main");
      
      // Filter State
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");
      const [filterPIC, setFilterPIC] = useState("Semua");

      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        db.ref("entries").on("value", (snapshot) => {
          const val = snapshot.val();
          setEntries(val ? Object.keys(val).map(k => ({...val[k], firebaseId: k})) : []);
          setIsLoading(false);
        });
      }, []);

      // Logika Filter Tanggal & PIC
      const filteredData = useMemo(() => {
        return entries.filter(e => {
          const matchDate = (!startDate || e.date >= startDate) && (!endDate || e.date <= endDate);
          const matchPIC = filterPIC === "Semua" || e.pic === filterPIC;
          return matchDate && matchPIC;
        }).sort((a,b) => a.date.localeCompare(b.date));
      }, [entries, startDate, endDate, filterPIC]);

      // Grafik Effect
      useEffect(() => {
        if (activeTab === "summary" && filteredData.length > 0) {
          const ctx = document.getElementById('expenseChart');
          if (ctx) {
            if (chartInstance.current) chartInstance.current.destroy();
            
            const cats = {};
            filteredData.filter(e => e.type === "expense").forEach(e => {
              cats[e.category] = (cats[e.category] || 0) + e.amount;
            });

            chartInstance.current = new Chart(ctx, {
              type: 'doughnut',
              data: {
                labels: Object.keys(cats),
                datasets: [{
                  data: Object.values(cats),
                  backgroundColor: ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#6b7280']
                }]
              },
              options: { plugins: { legend: { position: 'bottom' } } }
            });
          }
        }
      }, [activeTab, filteredData]);

      if (isLoading) return <div className="h-screen flex items-center justify-center font-bold text-gray-500">Menghubungkan ke Cloud...</div>;

      return (
        <div className="max-w-4xl mx-auto p-4 pb-20">
          <header className="flex justify-between items-center mb-6">
            <div>
              <h1 className="text-xl font-bold text-gray-800">💰 KEUANGAN KELUARGA</h1>
              <p className="text-xs text-green-600 font-bold">● LIVE SYNC ACTIVE</p>
            </div>
            <button onClick={() => setShowForm(!showForm)} className="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">
              {showForm ? "Tutup" : "＋ Transaksi"}
            </button>
          </header>

          {/* FILTER RANGE TANGGAL */}
          <div className="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-100">
            <h2 className="text-xs font-bold text-gray-400 mb-3 uppercase">Filter Data</h2>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              <div>
                <label className="block text-[10px] text-gray-500 mb-1">Mulai Tanggal</label>
                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full border rounded-md p-2 text-xs" />
              </div>
              <div>
                <label className="block text-[10px] text-gray-500 mb-1">Sampai Tanggal</label>
                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full border rounded-md p-2 text-xs" />
              </div>
              <div className="col-span-2 md:col-span-1">
                <label className="block text-[10px] text-gray-500 mb-1">PIC</label>
                <select value={filterPIC} onChange={e => setFilterPIC(e.target.value)} className="w-full border rounded-md p-2 text-xs">
                  <option value="Semua">Semua PIC</option>
                  {PICs.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
            </div>
            {(startDate || endDate) && (
              <button onClick={() => {setStartDate(""); setEndDate("");}} className="mt-3 text-[10px] text-red-500 font-bold underline">Reset Filter</button>
            )}
          </div>

          {/* TAB NAVIGATION */}
          <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
            <button onClick={() => setActiveTab("main")} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap ${activeTab==='main' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-600'}`}>📋 Transaksi</button>
            <button onClick={() => setActiveTab("summary")} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap ${activeTab==='summary' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-600'}`}>📊 Analisis Grafik</button>
          </div>

          {/* CONTENT: GRAFIK */}
          {activeTab === "summary" && (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="bg-white p-6 rounded-2xl shadow-sm border text-center">
                <h3 className="font-bold text-gray-700 mb-4">Proporsi Pengeluaran</h3>
                <canvas id="expenseChart" className="max-h-[300px] mx-auto"></canvas>
              </div>
            </div>
          )}

          {/* CONTENT: TABEL */}
          {activeTab === "main" && (
            <div className="space-y-3">
              {filteredData.length === 0 ? (
                <div className="text-center py-20 text-gray-400">Tidak ada data di rentang tanggal ini.</div>
              ) : (
                filteredData.map(e => (
                  <div key={e.firebaseId} className="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <div>
                      <div className="text-[10px] text-gray-400 mb-1">{e.date} • {e.pic}</div>
                      <div className="text-sm font-bold text-gray-800">{e.desc}</div>
                      <div className="text-[10px] text-gray-500">{e.category}</div>
                    </div>
                    <div className={`font-bold ${e.type === 'income' ? 'text-green-600' : 'text-red-500'}`}>
                      {e.type === 'income' ? '+' : '-'}{fmt(e.amount)}
                    </div>
                  </div>
                ))
              )}
            </div>
          )}
          
          {/* Form input tetap sama seperti sebelumnya (disingkat untuk fokus pada fitur baru) */}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
