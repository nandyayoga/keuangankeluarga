<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💰 KEUANGAN KELUARGA (Firebase Sync)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; background: #f9fafb; }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #aaa; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // --- KONFIGURASI FIREBASE ---
    // GANTI seluruh isi di bawah ini dengan yang Anda salin dari Firebase Console!
    const firebaseConfig = {
      apiKey: "AIzaSyCGu27iPkpJ5_l0-_vaxUy1EpCofLzT1yg",
      authDomain: "keuangan-keluarga-bfedc.firebaseapp.com",
      databaseURL: "https://keuangan-keluarga-bfedc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "keuangan-keluarga-bfedc",
      storageBucket: "keuangan-keluarga-bfedc.firebasestorage.app",
      messagingSenderId: "1089257207734",
      appId: "1:1089257207734:web:60d64302720dff0b703317"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const { useState, useEffect, useMemo } = React;

    const EXPENSE_CATS = [
      "Cicilan Rumah","Tabungan","Beban Bulanan","Belanja Rumah Tangga","Nafkah Istri",
      "Biaya Entertainment","Orang Tua","Biaya Transportasi","Sedekah/Zakat",
      "Kesehatan","Penunjang kerja suami","Kebutuhan Pribadi Istri","Lainnya"
    ];
    const INCOME_CATS = ["Gaji","Pendapatan Lainnya"];
    const TRANSFER_CATS = ["Pindah Ke Suami","Pindah Ke Istri"];
    const CATEGORIES = [...INCOME_CATS,...EXPENSE_CATS,...TRANSFER_CATS];
    const PICs = ["Bersama","Suami","Istri"];

    const fmt = (n) => new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",minimumFractionDigits:0}).format(n||0);
    const toNum = (s) => parseFloat(String(s).replace(/[^0-9.-]/g,""))||0;
    const EMPTY_FORM = {date:"",desc:"",category:"Belanja Rumah Tangga",type:"expense",amount:"",pic:"Bersama",note:""};
    const getTypeFromCat = (cat) => INCOME_CATS.includes(cat)?"income":TRANSFER_CATS.includes(cat)?"transfer":"expense";

    const DEFAULT_ESTIMATES = {
      "Cicilan Rumah":6360880,"Tabungan":0,"Beban Bulanan":2463450,
      "Belanja Rumah Tangga":4815811,"Nafkah Istri":1200000,"Biaya Entertainment":800000,
      "Orang Tua":1500000,"Biaya Transportasi":1000000,"Sedekah/Zakat":150000,
      "Kesehatan":200000,"Penunjang kerja suami":700000,"Kebutuhan Pribadi Istri":0,"Lainnya":500000
    };

    function useIsMobile() {
      const [mob, setMob] = React.useState(window.innerWidth < 768);
      React.useEffect(() => {
        const h = () => setMob(window.innerWidth < 768);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);
      return mob;
    }

    function App() {
      const isMobile = useIsMobile();
      const [entries, setEntries] = useState([]);
      const [estimates, setEstimates] = useState(DEFAULT_ESTIMATES);
      const [form, setForm] = useState(EMPTY_FORM);
      const [editId, setEditId] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [filterPIC, setFilterPIC] = useState("Semua");
      const [filterCat, setFilterCat] = useState("Semua");
      const [activeTab, setActiveTab] = useState("main");
      const [editingEst, setEditingEst] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      // Sinkronisasi data dari Firebase secara Real-time
      useEffect(() => {
        const entriesRef = db.ref("entries");
        const estimatesRef = db.ref("estimates");

        entriesRef.on("value", (snapshot) => {
          const val = snapshot.val();
          if (val) {
            const list = Object.keys(val).map(key => ({ ...val[key], firebaseId: key }));
            setEntries(list);
          } else {
            setEntries([]);
          }
          setIsLoading(false);
        });

        estimatesRef.on("value", (snapshot) => {
          const val = snapshot.val();
          if (val) setEstimates(val);
        });

        return () => {
          entriesRef.off();
          estimatesRef.off();
        };
      }, []);

      const sorted = useMemo(()=>[...entries].sort((a,b)=>a.date.localeCompare(b.date)),[entries]);
      const filtered = useMemo(()=>sorted.filter(e=>(filterPIC==="Semua"||e.pic===filterPIC)&&(filterCat==="Semua"||e.category===filterCat)),[sorted,filterPIC,filterCat]);
      const runBalance = useMemo(()=>{ let bal=0; return filtered.map(e=>{ if(e.type==="income")bal+=e.amount; else bal-=e.amount; return {...e,running:bal}; }); },[filtered]);

      const suamiEntries = useMemo(()=>sorted.filter(e=>e.category==="Pindah Ke Suami"||(e.pic==="Suami"&&e.type==="expense")),[sorted]);
      const suamiLedger = useMemo(()=>{ let b=0; return suamiEntries.map(e=>{ if(e.category==="Pindah Ke Suami")b+=e.amount; else b-=e.amount; return {...e,running:b}; }); },[suamiEntries]);
      const istriEntries = useMemo(()=>sorted.filter(e=>e.category==="Pindah Ke Istri"||(e.pic==="Istri"&&e.type==="expense")),[sorted]);
      const istriLedger = useMemo(()=>{ let b=0; return istriEntries.map(e=>{ if(e.category==="Pindah Ke Istri")b+=e.amount; else b-=e.amount; return {...e,running:b}; }); },[istriEntries]);

      const totalIncome = useMemo(()=>entries.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0),[entries]);
      const totalExpense = useMemo(()=>entries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0),[entries]);
      const totalTransferSuami = useMemo(()=>entries.filter(e=>e.category==="Pindah Ke Suami").reduce((s,e)=>s+e.amount,0),[entries]);
      const totalTransferIstri = useMemo(()=>entries.filter(e=>e.category==="Pindah Ke Istri").reduce((s,e)=>s+e.amount,0),[entries]);
      const totalTransfer = totalTransferSuami+totalTransferIstri;
      const balance = totalIncome-totalExpense-totalTransfer;
      const suamiSaldo = useMemo(()=>suamiLedger.length>0?suamiLedger[suamiLedger.length-1].running:0,[suamiLedger]);
      const istriSaldo = useMemo(()=>istriLedger.length>0?istriLedger[istriLedger.length-1].running:0,[istriLedger]);
      const catTotals = useMemo(()=>{ const m={}; entries.filter(e=>e.type==="expense").forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;}); return m; },[entries]);

      const handleCatChange=(cat)=>{ const type=getTypeFromCat(cat); const pic=cat==="Pindah Ke Suami"?"Suami":cat==="Pindah Ke Istri"?"Istri":form.pic; setForm(f=>({...f,category:cat,type,pic})); };
      
      const handleSave=()=>{ 
        if(!form.date||!form.desc||!form.amount)return alert("Isi tanggal, deskripsi, dan nominal!"); 
        const entry={...form,amount:toNum(form.amount),type:getTypeFromCat(form.category), id: Date.now()}; 
        
        if(editId!==null){
          db.ref("entries/" + editId).update(entry);
          setEditId(null);
        } else {
          db.ref("entries").push(entry);
        } 
        setForm(EMPTY_FORM);setShowForm(false); 
      };

      const handleEdit=(e)=>{setForm({...e,amount:String(e.amount)});setEditId(e.firebaseId);setShowForm(true);setActiveTab("main");};
      const handleDelete=(id)=>{if(confirm("Hapus entri ini?")) db.ref("entries/" + id).remove();};
      const clearAll=()=>{if(confirm("Hapus semua data secara permanen?")){ db.ref("entries").remove(); }};

      const updateEstimate=(cat, val)=>{
        db.ref("estimates/" + cat).set(toNum(val));
        setEditingEst(null);
      };

      const exportCSV=()=>{
        if(!entries.length)return alert("Belum ada data.");
        const h=["ID","Tanggal","Kategori","Deskripsi","Tipe","Nominal","PIC","Keterangan"];
        const rows=entries.map(e=>[e.id,e.date,e.category,e.desc,e.type,e.amount,e.pic,e.note]);
        const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
        const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);
        a.download="keuangan-keluarga.csv";a.click();
      };

      const exportXLSX=()=>{
        if(!entries.length)return alert("Belum ada data.");
        const X=window.XLSX; if(!X){alert("Library Excel gagal dimuat.");return;}
        const wb=X.utils.book_new();
        const mainData=[
          ["ID","Tanggal","Kategori","Deskripsi","Tipe","Kredit","Debit","Transfer","Saldo","PIC","Keterangan"],
          ...runBalance.map(e=>[e.id,e.date,e.category,e.desc,
            e.type==="income"?"Pemasukan":e.type==="transfer"?"Transfer":"Pengeluaran",
            e.type==="income"?e.amount:"",e.type==="expense"?e.amount:"",e.type==="transfer"?e.amount:"",
            e.running,e.pic,e.note]),
          [],["","","","","TOTAL",totalIncome,totalExpense,totalTransfer,balance,"",""]
        ];
        const ws1=X.utils.aoa_to_sheet(mainData);
        ws1["!cols"]=[{wch:6},{wch:12},{wch:22},{wch:30},{wch:12},{wch:16},{wch:16},{wch:14},{wch:16},{wch:10},{wch:20}];
        X.utils.book_append_sheet(wb,ws1,"Semua Transaksi");

        const totalEst=EXPENSE_CATS.reduce((s,c)=>s+(estimates[c]||0),0);
        const totalReal=EXPENSE_CATS.reduce((s,c)=>s+(catTotals[c]||0),0);
        const summaryData=[
          ["RINGKASAN KEUANGAN KELUARGA"],
          [],
          ["Total Pendapatan","",totalIncome],
          ["Total Pengeluaran","",totalExpense],
          ["Total Transfer","",totalTransfer],
          ["Saldo Kas Utama","",balance],
          ["Saldo Kas Suami","",suamiSaldo],
          ["Saldo Kas Istri","",istriSaldo],
          ["Total Aset Keluarga","",balance+suamiSaldo+istriSaldo],
          [],
          ["RINCIAN PER KATEGORI"],
          ["Kategori","Estimasi","Realisasi","% Realisasi","Selisih"],
          ...EXPENSE_CATS.map(cat=>{
            const est=estimates[cat]||0,real=catTotals[cat]||0;
            return[cat,est,real,est>0?((real/est)*100).toFixed(1)+"%":"–",est-real];
          }),
          ["TOTAL",totalEst,totalReal,totalEst>0?((totalReal/totalEst)*100).toFixed(1)+"%":"–",totalEst-totalReal]
        ];
        const ws2=X.utils.aoa_to_sheet(summaryData);
        ws2["!cols"]=[{wch:30},{wch:16},{wch:16},{wch:14},{wch:16}];
        X.utils.book_append_sheet(wb,ws2,"Ringkasan");
        X.writeFile(wb,"keuangan-keluarga.xlsx");
      };

      const TypeBadge=({type,cat})=>{
        const isT=type==="transfer",isI=type==="income";
        const cls=isT&&cat==="Pindah Ke Suami"?"bg-blue-100 text-blue-700":isT&&cat==="Pindah Ke Istri"?"bg-pink-100 text-pink-700":isI?"bg-green-100 text-green-700":"bg-red-100 text-red-700";
        return <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${cls}`}>{isT?"↔ Transfer":isI?"⬆ Masuk":"⬇ Keluar"}</span>;
      };

      const TransactionCard=({e,running,showEdit=true})=>{
        const isT=e.type==="transfer",isI=e.type==="income";
        const bg=e.category==="Pindah Ke Suami"?"bg-blue-50 border-blue-200":e.category==="Pindah Ke Istri"?"bg-pink-50 border-pink-200":isI?"bg-green-50 border-green-200":"bg-white border-gray-200";
        return(
          <div className={`rounded-xl border p-3 mb-2 ${bg} shadow-sm`}>
            <div className="flex items-start justify-between gap-2">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap mb-1">
                  <TypeBadge type={e.type} cat={e.category}/>
                  <span className="text-xs text-gray-500">{e.date}</span>
                  {!isT&&<span className={`text-xs px-1.5 py-0.5 rounded-full ${e.pic==="Suami"?"bg-blue-100 text-blue-700":e.pic==="Istri"?"bg-pink-100 text-pink-700":"bg-gray-100 text-gray-600"}`}>{e.pic}</span>}
                </div>
                <div className="font-semibold text-sm text-gray-800 truncate">{e.desc}</div>
                <div className="text-xs text-gray-500 mt-0.5">{e.category}</div>
                {e.note&&<div className="text-xs text-gray-400 mt-0.5 italic">"{e.note}"</div>}
              </div>
              <div className="text-right shrink-0">
                <div className={`text-sm font-bold ${isI?"text-green-700":isT?"text-purple-700":"text-red-600"}`}>{isI?"+":isT?"↔":"−"}{fmt(e.amount)}</div>
                {running!==undefined&&<div className={`text-xs mt-0.5 font-medium ${running>=0?"text-blue-600":"text-orange-600"}`}>Saldo: {fmt(running)}</div>}
              </div>
            </div>
            {showEdit&&(
              <div className="flex gap-2 mt-2 pt-2 border-t border-gray-100">
                <button onClick={()=>handleEdit(e)} className="flex-1 py-1.5 rounded-lg bg-blue-50 text-blue-600 text-xs font-semibold hover:bg-blue-100">✏️ Edit</button>
                <button onClick={()=>handleDelete(e.firebaseId)} className="flex-1 py-1.5 rounded-lg bg-red-50 text-red-500 text-xs font-semibold hover:bg-red-100">🗑 Hapus</button>
              </div>
            )}
          </div>
        );
      };

      const tdCls="border border-gray-200 px-2 py-1 text-xs";
      const thCls="border border-gray-300 px-2 py-1.5 text-xs font-semibold text-white text-left";

      const EmptyState=({icon,msg})=>(
        <div className="flex flex-col items-center justify-center py-16 text-gray-400">
          <div className="text-4xl mb-2">{icon}</div>
          <div className="text-sm text-center px-4">{msg}</div>
          <button onClick={()=>{setForm(EMPTY_FORM);setEditId(null);setShowForm(true);setActiveTab("main");}}
            className="mt-3 bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700">+ Tambah Transaksi Pertama</button>
        </div>
      );

      const tabs=[{id:"main",l:"📋 Utama"},{id:"suami",l:"👨 Suami"},{id:"istri",l:"👩 Istri"},{id:"summary",l:"📊 Ringkasan"}];

      if (isLoading) return <div className="min-h-screen flex items-center justify-center text-gray-500 font-bold">Memuat Data Keuangan...</div>;

      return (
        <div className="min-h-screen bg-gray-50" style={{fontFamily:"system-ui,sans-serif"}}>
          {/* HEADER */}
          <div className="bg-white border-b shadow-sm sticky top-0 z-20">
            <div className="max-w-screen-2xl mx-auto px-3 py-2">
              <div className="flex items-center justify-between gap-2 mb-2">
                <div className="flex flex-col">
                  <span className="text-base font-bold text-gray-800">💰 KEUANGAN KELUARGA</span>
                  <span className="text-[10px] text-green-600 font-bold">☁️ CLOUD SYNC ACTIVE</span>
                </div>
                <div className="flex gap-1.5">
                  <button onClick={()=>{setForm(EMPTY_FORM);setEditId(null);setShowForm(s=>!s);}} className="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-green-700">{showForm?"✕":"＋ Tambah"}</button>
                  <button onClick={exportXLSX} className="bg-emerald-600 text-white px-2.5 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-700">⬇ XLS</button>
                  <button onClick={exportCSV} className="bg-blue-600 text-white px-2.5 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700">⬇ CSV</button>
                  {entries.length>0&&<button onClick={clearAll} className="bg-red-400 text-white px-2.5 py-1.5 rounded-lg text-xs hover:bg-red-500">🗑</button>}
                </div>
              </div>
              <div className="flex gap-2 overflow-x-auto pb-1" style={{scrollbarWidth:"none"}}>
                {[
                  {l:"Masuk",v:totalIncome,vc:"text-green-700",bc:"bg-green-50 border-green-200"},
                  {l:"Keluar",v:totalExpense,vc:"text-red-700",bc:"bg-red-50 border-red-200"},
                  {l:"Transfer",v:totalTransfer,vc:"text-purple-700",bc:"bg-purple-50 border-purple-200"},
                  {l:"Kas Utama",v:balance,vc:balance>=0?"text-blue-700":"text-orange-700",bc:balance>=0?"bg-blue-50 border-blue-200":"bg-orange-50 border-orange-200"},
                  {l:"Kas Suami",v:suamiSaldo,vc:suamiSaldo>=0?"text-blue-700":"text-red-700",bc:suamiSaldo>=0?"bg-blue-50 border-blue-200":"bg-red-50 border-red-200"},
                  {l:"Kas Istri",v:istriSaldo,vc:istriSaldo>=0?"text-pink-700":"text-red-700",bc:istriSaldo>=0?"bg-pink-50 border-pink-200":"bg-red-50 border-red-200"},
                ].map(({l,v,vc,bc})=>(
                  <div key={l} className={`flex flex-col items-center border rounded-lg px-3 py-1 shrink-0 ${bc}`}>
                    <span className="text-xs text-gray-500 whitespace-nowrap">{l}</span>
                    <span className={`text-xs font-bold whitespace-nowrap ${vc}`}>{fmt(v)}</span>
                  </div>
                ))}
              </div>
              <div className="flex gap-1 mt-2 overflow-x-auto" style={{scrollbarWidth:"none"}}>
                {tabs.map(t=>(
                  <button key={t.id} onClick={()=>setActiveTab(t.id)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold shrink-0 transition-all ${activeTab===t.id?"bg-green-600 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>{t.l}</button>
                ))}
              </div>
            </div>
          </div>

          {/* FORM */}
          {showForm&&(
            <div className="max-w-screen-2xl mx-auto px-3 py-3">
              <div className="bg-white rounded-xl border shadow-sm p-4">
                <div className="text-sm font-bold text-gray-700 mb-3">{editId?"✏️ Edit Entri":"➕ Tambah Entri Baru"}</div>
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1 font-medium">Tanggal *</label>
                    <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"/>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1 font-medium">Kategori</label>
                    <select value={form.category} onChange={e=>handleCatChange(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500">
                      <optgroup label="── Pendapatan">{INCOME_CATS.map(c=><option key={c}>{c}</option>)}</optgroup>
                      <optgroup label="── Pengeluaran">{EXPENSE_CATS.map(c=><option key={c}>{c}</option>)}</optgroup>
                      <optgroup label="── Transfer Kas">{TRANSFER_CATS.map(c=><option key={c}>{c}</option>)}</optgroup>
                    </select>
                  </div>
                  <div className="sm:col-span-2 md:col-span-1">
                    <label className="block text-xs text-gray-500 mb-1 font-medium">Deskripsi *</label>
                    <input type="text" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Keterangan..." className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"/>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1 font-medium">Nominal (Rp) *</label>
                    <input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"/>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1 font-medium">Tipe</label>
                    <div className={`border rounded-lg px-3 py-2 text-sm font-semibold ${form.type==="income"?"bg-green-50 text-green-700 border-green-300":form.type==="transfer"?"bg-purple-50 text-purple-700 border-purple-300":"bg-red-50 text-red-700 border-red-300"}`}>
                      {form.type==="income"?"⬆ Pemasukan":form.type==="transfer"?"↔ Transfer":"⬇ Pengeluaran"}
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1 font-medium">PIC</label>
                    <select value={form.pic} onChange={e=>setForm(f=>({...f,pic:e.target.value}))} disabled={TRANSFER_CATS.includes(form.category)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 disabled:bg-gray-100">
                      {PICs.map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1 font-medium">Keterangan</label>
                    <input type="text" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Opsional..." className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"/>
                  </div>
                </div>
                {TRANSFER_CATS.includes(form.category)&&<div className="mt-2 text-xs text-purple-600 bg-purple-50 border border-purple-200 rounded-lg px-3 py-2">💡 Akan menambah saldo kas {form.category==="Pindah Ke Suami"?"Suami":"Istri"}</div>}
                <div className="flex gap-2 mt-3">
                  <button onClick={handleSave} className="flex-1 bg-green-600 text-white py-2.5 rounded-lg text-sm font-bold hover:bg-green-700">{editId?"💾 Simpan":"➕ Tambah"}</button>
                  <button onClick={()=>{setShowForm(false);setEditId(null);setForm(EMPTY_FORM);}} className="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-300">Batal</button>
                </div>
              </div>
            </div>
          )}

          {/* CONTENT */}
          <div className="max-w-screen-2xl mx-auto px-3 pb-10">

            {/* TAB UTAMA */}
            {activeTab==="main"&&(
              <div className="mt-3">
                <div className="flex gap-2 mb-3 flex-wrap items-center">
                  <select value={filterPIC} onChange={e=>setFilterPIC(e.target.value)} className="border border-gray-300 rounded-lg px-2 py-1.5 text-xs flex-1 min-w-0">
                    <option value="Semua">Semua PIC</option>{PICs.map(p=><option key={p}>{p}</option>)}
                  </select>
                  <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="border border-gray-300 rounded-lg px-2 py-1.5 text-xs flex-1 min-w-0">
                    <option value="Semua">Semua Kategori</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                  <span className="text-xs text-gray-400 shrink-0">{filtered.length} entri</span>
                </div>
                {filtered.length===0?<EmptyState icon="📭" msg="Belum ada transaksi."/>
                  :isMobile
                    ?<div>{runBalance.map(e=><TransactionCard key={e.id} e={e} running={e.running}/>)}</div>
                    :(
                      <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                          <table className="w-full border-collapse" style={{minWidth:980}}>
                            <thead>
                              <tr style={{background:"#2d7d46"}}>
                                <th className={thCls} style={{width:32}}>#</th>
                                <th className={thCls} style={{width:90}}>Tanggal</th>
                                <th className={thCls} style={{width:150}}>Kategori</th>
                                <th className={thCls}>Deskripsi</th>
                                <th className={thCls} style={{width:85}}>Tipe</th>
                                <th className={thCls+" text-right"} style={{width:130}}>Kredit (Masuk)</th>
                                <th className={thCls+" text-right"} style={{width:130}}>Debit (Keluar)</th>
                                <th className={thCls+" text-right"} style={{width:120}}>Transfer</th>
                                <th className={thCls+" text-right"} style={{width:130}}>Saldo</th>
                                <th className={thCls} style={{width:70}}>PIC</th>
                                <th className={thCls} style={{width:110}}>Keterangan</th>
                                <th className={thCls} style={{width:60}}>Aksi</th>
                              </tr>
                            </thead>
                            <tbody>
                              {runBalance.map((e,i)=>{
                                const isT=e.type==="transfer",isI=e.type==="income";
                                const bg=e.category==="Pindah Ke Suami"?"bg-blue-50":e.category==="Pindah Ke Istri"?"bg-pink-50":i%2===0?"bg-white":"bg-gray-50";
                                return(
                                  <tr key={e.id} className={`${bg} hover:bg-yellow-50 transition-colors`}>
                                    <td className={tdCls+" text-gray-400 text-center"}>{i+1}</td>
                                    <td className={tdCls+" text-gray-600 whitespace-nowrap"}>{e.date}</td>
                                    <td className={tdCls}><span className={`px-1.5 py-0.5 rounded text-xs ${isT&&e.category==="Pindah Ke Suami"?"bg-blue-100 text-blue-700":isT&&e.category==="Pindah Ke Istri"?"bg-pink-100 text-pink-700":isI?"bg-green-100 text-green-700":"bg-orange-100 text-orange-700"}`}>{e.category}</span></td>
                                    <td className={tdCls+" text-gray-800 font-medium"}>{e.desc}</td>
                                    <td className={tdCls}><span className={`px-1.5 py-0.5 rounded text-xs font-medium ${isT?"bg-purple-100 text-purple-700":isI?"bg-green-600 text-white":"bg-red-100 text-red-700"}`}>{isT?"↔ Transfer":isI?"⬆ Masuk":"⬇ Keluar"}</span></td>
                                    <td className={tdCls+" text-right text-green-700 font-medium"}>{isI?fmt(e.amount):""}</td>
                                    <td className={tdCls+" text-right text-red-600 font-medium"}>{!isI&&!isT?fmt(e.amount):""}</td>
                                    <td className={tdCls+" text-right text-purple-600 font-medium"}>{isT?fmt(e.amount):""}</td>
                                    <td className={tdCls+` text-right font-semibold ${e.running>=0?"text-blue-700":"text-red-700"}`}>{fmt(e.running)}</td>
                                    <td className={tdCls}>{!isT&&<span className={`px-1.5 py-0.5 rounded text-xs ${e.pic==="Suami"?"bg-blue-100 text-blue-700":e.pic==="Istri"?"bg-pink-100 text-pink-700":"bg-gray-100 text-gray-600"}`}>{e.pic}</span>}</td>
                                    <td className={tdCls+" text-gray-400 text-xs"}>{e.note}</td>
                                    <td className={tdCls+" text-center"}>
                                      <div className="flex gap-1 justify-center">
                                        <button onClick={()=>handleEdit(e)} className="text-blue-500 hover:text-blue-700">✏️</button>
                                        <button onClick={()=>handleDelete(e.firebaseId)} className="text-red-400 hover:text-red-600">🗑</button>
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                            <tfoot>
                              <tr style={{background:"#1a5c32"}}>
                                <td colSpan={5} className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-white">TOTAL</td>
                                <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-green-200 text-right">{fmt(totalIncome)}</td>
                                <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-red-200 text-right">{fmt(totalExpense)}</td>
                                <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-purple-200 text-right">{fmt(totalTransfer)}</td>
                                <td className={`border border-gray-300 px-2 py-1.5 text-xs font-bold text-right ${balance>=0?"text-cyan-200":"text-orange-300"}`}>{fmt(balance)}</td>
                                <td colSpan={3} className="border border-gray-300"/>
                              </tr>
                            </tfoot>
                          </table>
                        </div>
                      </div>
                    )
                }
              </div>
            )}

            {/* TAB SUAMI */}
            {activeTab==="suami"&&(
              <div className="mt-3">
                <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                  <span className="text-sm font-bold text-blue-700">👨 Buku Kas Suami</span>
                  <div className="flex gap-2 flex-wrap">
                    <div className="bg-blue-50 border border-blue-200 rounded-lg px-3 py-1"><span className="text-xs text-blue-600">Dana: </span><span className="text-xs font-bold text-blue-800">{fmt(totalTransferSuami)}</span></div>
                    <div className={`border rounded-lg px-3 py-1 ${suamiSaldo>=0?"bg-green-50 border-green-200":"bg-red-50 border-red-200"}`}><span className="text-xs text-gray-600">Saldo: </span><span className={`text-xs font-bold ${suamiSaldo>=0?"text-green-800":"text-red-800"}`}>{fmt(suamiSaldo)}</span></div>
                  </div>
                </div>
                {suamiLedger.length===0?<EmptyState icon="👨" msg="Belum ada kas Suami. Tambahkan 'Pindah Ke Suami'."/>
                  :isMobile
                    ?<div>{suamiLedger.map(e=><TransactionCard key={e.id} e={e} running={e.running} showEdit={false}/>)}</div>
                    :(
                      <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                          <table className="w-full border-collapse" style={{minWidth:700}}>
                            <thead><tr style={{background:"#c2763a"}}>
                              <th className={thCls}>#</th><th className={thCls}>Tanggal</th><th className={thCls}>Kategori</th><th className={thCls}>Deskripsi</th>
                              <th className={thCls+" text-right"}>Dana Masuk</th><th className={thCls+" text-right"}>Pengeluaran</th><th className={thCls+" text-right"}>Saldo Kas</th><th className={thCls}>Keterangan</th>
                            </tr></thead>
                            <tbody>
                              {suamiLedger.map((e,i)=>{ const isIn=e.category==="Pindah Ke Suami"; return(
                                <tr key={e.id} className={`${isIn?"bg-blue-50":i%2===0?"bg-white":"bg-orange-50"} hover:bg-yellow-50`}>
                                  <td className={tdCls+" text-gray-400 text-center"}>{i+1}</td>
                                  <td className={tdCls+" whitespace-nowrap text-gray-600"}>{e.date}</td>
                                  <td className={tdCls}><span className={`px-1.5 py-0.5 rounded text-xs ${isIn?"bg-blue-100 text-blue-700":"bg-orange-100 text-orange-700"}`}>{isIn?"↔ Transfer":e.category}</span></td>
                                  <td className={tdCls+" text-gray-800 font-medium"}>{e.desc}</td>
                                  <td className={tdCls+" text-right text-blue-600 font-medium"}>{isIn?fmt(e.amount):""}</td>
                                  <td className={tdCls+" text-right text-red-600 font-medium"}>{!isIn?fmt(e.amount):""}</td>
                                  <td className={tdCls+` text-right font-semibold ${e.running>=0?"text-green-700":"text-red-700"}`}>{fmt(e.running)}</td>
                                  <td className={tdCls+" text-gray-400 text-xs"}>{e.note}</td>
                                </tr>
                              );})}
                            </tbody>
                            <tfoot><tr style={{background:"#8b4513"}}>
                              <td colSpan={4} className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-white">TOTAL KAS SUAMI</td>
                              <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-blue-200 text-right">{fmt(totalTransferSuami)}</td>
                              <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-red-200 text-right">{fmt(suamiEntries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0))}</td>
                              <td className={`border border-gray-300 px-2 py-1.5 text-xs font-bold text-right ${suamiSaldo>=0?"text-green-200":"text-orange-300"}`}>{fmt(suamiSaldo)}</td>
                              <td className="border border-gray-300"/>
                            </tr></tfoot>
                          </table>
                        </div>
                      </div>
                    )
                }
              </div>
            )}

            {/* TAB ISTRI */}
            {activeTab==="istri"&&(
              <div className="mt-3">
                <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                  <span className="text-sm font-bold text-pink-700">👩 Buku Kas Istri</span>
                  <div className="flex gap-2 flex-wrap">
                    <div className="bg-pink-50 border border-pink-200 rounded-lg px-3 py-1"><span className="text-xs text-pink-600">Dana: </span><span className="text-xs font-bold text-pink-800">{fmt(totalTransferIstri)}</span></div>
                    <div className={`border rounded-lg px-3 py-1 ${istriSaldo>=0?"bg-green-50 border-green-200":"bg-red-50 border-red-200"}`}><span className="text-xs text-gray-600">Saldo: </span><span className={`text-xs font-bold ${istriSaldo>=0?"text-green-800":"text-red-800"}`}>{fmt(istriSaldo)}</span></div>
                  </div>
                </div>
                {istriLedger.length===0?<EmptyState icon="👩" msg="Belum ada kas Istri. Tambahkan 'Pindah Ke Istri'."/>
                  :isMobile
                    ?<div>{istriLedger.map(e=><TransactionCard key={e.id} e={e} running={e.running} showEdit={false}/>)}</div>
                    :(
                      <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                          <table className="w-full border-collapse" style={{minWidth:700}}>
                            <thead><tr style={{background:"#b85c88"}}>
                              <th className={thCls}>#</th><th className={thCls}>Tanggal</th><th className={thCls}>Kategori</th><th className={thCls}>Deskripsi</th>
                              <th className={thCls+" text-right"}>Dana Masuk</th><th className={thCls+" text-right"}>Pengeluaran</th><th className={thCls+" text-right"}>Saldo Kas</th><th className={thCls}>Keterangan</th>
                            </tr></thead>
                            <tbody>
                              {istriLedger.map((e,i)=>{ const isIn=e.category==="Pindah Ke Istri"; return(
                                <tr key={e.id} className={`${isIn?"bg-pink-50":i%2===0?"bg-white":"bg-pink-50"} hover:bg-yellow-50`}>
                                  <td className={tdCls+" text-gray-400 text-center"}>{i+1}</td>
                                  <td className={tdCls+" whitespace-nowrap text-gray-600"}>{e.date}</td>
                                  <td className={tdCls}><span className={`px-1.5 py-0.5 rounded text-xs ${isIn?"bg-pink-100 text-pink-700":"bg-orange-100 text-orange-700"}`}>{isIn?"↔ Transfer":e.category}</span></td>
                                  <td className={tdCls+" text-gray-800 font-medium"}>{e.desc}</td>
                                  <td className={tdCls+" text-right text-pink-600 font-medium"}>{isIn?fmt(e.amount):""}</td>
                                  <td className={tdCls+" text-right text-red-600 font-medium"}>{!isIn?fmt(e.amount):""}</td>
                                  <td className={tdCls+` text-right font-semibold ${e.running>=0?"text-green-700":"text-red-700"}`}>{fmt(e.running)}</td>
                                  <td className={tdCls+" text-gray-400 text-xs"}>{e.note}</td>
                                </tr>
                              );})}
                            </tbody>
                            <tfoot><tr style={{background:"#8b2252"}}>
                              <td colSpan={4} className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-white">TOTAL KAS ISTRI</td>
                              <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-pink-200 text-right">{fmt(totalTransferIstri)}</td>
                              <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-red-200 text-right">{fmt(istriEntries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0))}</td>
                              <td className={`border border-gray-300 px-2 py-1.5 text-xs font-bold text-right ${istriSaldo>=0?"text-green-200":"text-orange-300"}`}>{fmt(istriSaldo)}</td>
                              <td className="border border-gray-300"/>
                            </tr></tfoot>
                          </table>
                        </div>
                      </div>
                    )
                }
              </div>
            )}

            {/* TAB RINGKASAN */}
            {activeTab==="summary"&&(
              <div className="mt-3 space-y-4">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {[
                    {label:"🏦 Kas Utama",income:totalIncome,exp:totalExpense,out:totalTransfer,outLabel:"Transfer Keluar",saldo:balance,bc:"bg-gray-50 border-gray-200",sc:balance>=0?"text-blue-700":"text-orange-700"},
                    {label:"👨 Kas Suami",income:totalTransferSuami,exp:suamiEntries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0),out:null,saldo:suamiSaldo,bc:"bg-blue-50 border-blue-200",sc:suamiSaldo>=0?"text-blue-700":"text-red-700"},
                    {label:"👩 Kas Istri",income:totalTransferIstri,exp:istriEntries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0),out:null,saldo:istriSaldo,bc:"bg-pink-50 border-pink-200",sc:istriSaldo>=0?"text-pink-700":"text-red-700"},
                  ].map(r=>(
                    <div key={r.label} className={`rounded-xl border p-4 ${r.bc}`}>
                      <div className="text-sm font-bold text-gray-700 mb-2">{r.label}</div>
                      <div className="space-y-1">
                        <div className="flex justify-between text-sm"><span className="text-gray-500">{r.out!==null?"Pendapatan":"Dana Diterima"}</span><span className="text-green-700 font-semibold">{fmt(r.income)}</span></div>
                        <div className="flex justify-between text-sm"><span className="text-gray-500">Pengeluaran</span><span className="text-red-600 font-semibold">− {fmt(r.exp)}</span></div>
                        {r.out!==null&&<div className="flex justify-between text-sm"><span className="text-gray-500">{r.outLabel}</span><span className="text-purple-600 font-semibold">− {fmt(r.out)}</span></div>}
                        <div className="border-t pt-1 flex justify-between text-sm font-bold"><span>Saldo</span><span className={r.sc}>{fmt(r.saldo)}</span></div>
                      </div>
                    </div>
                  ))}
                  <div className="bg-gray-800 rounded-xl p-4 flex items-center justify-between sm:col-span-2">
                    <span className="text-sm text-gray-300 font-semibold">💰 Total Aset Keluarga</span>
                    <span className={`text-lg font-bold ${(balance+suamiSaldo+istriSaldo)>=0?"text-green-300":"text-red-400"}`}>{fmt(balance+suamiSaldo+istriSaldo)}</span>
                  </div>
                </div>

                <div className="bg-white rounded-xl border shadow-sm p-4">
                  <div className="flex items-center justify-between mb-3 flex-wrap gap-1">
                    <div className="text-sm font-bold text-gray-700">📊 Estimasi vs Realisasi</div>
                    <div className="text-xs text-gray-400">💡 Ketuk estimasi untuk edit</div>
                  </div>
                  {entries.length===0?<div className="text-center py-8 text-gray-400 text-sm">Belum ada data.</div>
                    :isMobile
                      ?<div className="space-y-2">
                          {EXPENSE_CATS.map(cat=>{
                            const est=estimates[cat]||0,real=catTotals[cat]||0;
                            const pct=est>0?(real/est*100):real>0?100:0,over=pct>100;
                            return(
                              <div key={cat} className="border border-gray-200 rounded-xl p-3 bg-gray-50">
                                <div className="flex justify-between items-start mb-1.5">
                                  <span className="text-xs font-semibold text-gray-700">{cat}</span>
                                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${over?"bg-red-100 text-red-600":pct>80?"bg-orange-100 text-orange-600":"bg-green-100 text-green-700"}`}>{est>0?pct.toFixed(0)+"%":"–"}</span>
                                </div>
                                <div className="h-2 bg-gray-200 rounded-full mb-1.5">
                                  <div className="h-full rounded-full" style={{width:`${Math.min(pct,100)}%`,background:over?"#dc2626":pct>80?"#f97316":"#16a34a"}}/>
                                </div>
                                <div className="flex justify-between text-xs">
                                  <span className="text-gray-500">Estimasi: <button onClick={()=>setEditingEst(cat)} className="text-blue-600 underline font-medium">{fmt(est)}</button></span>
                                  <span className={real>0?"text-red-600 font-semibold":"text-gray-400"}>Realisasi: {real>0?fmt(real):"–"}</span>
                                </div>
                                {editingEst===cat&&<input type="number" autoFocus defaultValue={est}
                                  onBlur={e=>updateEstimate(cat, e.target.value)}
                                  onKeyDown={e=>{if(e.key==="Enter"){updateEstimate(cat, e.target.value);}}}
                                  className="mt-2 w-full border border-blue-400 rounded-lg px-3 py-1.5 text-sm focus:outline-none"/>}
                                {over&&<div className="text-red-500 text-xs mt-1">⚠️ Over {(pct-100).toFixed(0)}% dari estimasi!</div>}
                              </div>
                            );
                          })}
                          {(()=>{ const tE=EXPENSE_CATS.reduce((s,c)=>s+(estimates[c]||0),0),tR=EXPENSE_CATS.reduce((s,c)=>s+(catTotals[c]||0),0),tP=tE>0?(tR/tE*100):0;
                            return(<div className="bg-gray-800 rounded-xl p-3 text-white">
                              <div className="flex justify-between text-sm font-bold mb-1"><span>TOTAL</span><span className={tP>100?"text-red-300":tP>80?"text-orange-300":"text-green-300"}>{tP.toFixed(0)}%</span></div>
                              <div className="flex justify-between text-xs text-gray-300"><span>Estimasi: {fmt(tE)}</span><span>Realisasi: {fmt(tR)}</span></div>
                            </div>);
                          })()}
                        </div>
                      :(
                        <div className="overflow-x-auto">
                          <table className="w-full border-collapse text-xs">
                            <thead><tr style={{background:"#c2763a"}}>
                              <th className={thCls}>Kategori</th>
                              <th className={thCls+" text-right"}>Estimasi</th>
                              <th className={thCls+" text-right"}>Realisasi</th>
                              <th className={thCls+" text-right"}>%</th>
                              <th className={thCls+" text-right"}>Selisih</th>
                              <th className={thCls} style={{width:140}}>Progress</th>
                            </tr></thead>
                            <tbody>
                              {EXPENSE_CATS.map((cat,i)=>{
                                const est=estimates[cat]||0,real=catTotals[cat]||0;
                                const pct=est>0?(real/est*100):real>0?100:0,over=pct>100,sel=est-real;
                                return(
                                  <tr key={cat} className={`${i%2===0?"bg-white":"bg-gray-50"} hover:bg-yellow-50`}>
                                    <td className={tdCls+" font-medium text-gray-700"}><span className="px-1.5 py-0.5 rounded bg-orange-100 text-orange-700">{cat}</span></td>
                                    <td className={tdCls+" text-right"}>
                                      {editingEst===cat
                                        ?<input type="number" autoFocus defaultValue={est}
                                            onBlur={e=>updateEstimate(cat, e.target.value)}
                                            onKeyDown={e=>{if(e.key==="Enter"){updateEstimate(cat, e.target.value);}}}
                                            className="w-28 border border-blue-400 rounded px-1 py-0.5 text-xs text-right focus:outline-none"/>
                                        :<button onClick={()=>setEditingEst(cat)} className="text-gray-600 hover:text-blue-600 hover:underline font-medium">{fmt(est)}</button>
                                      }
                                    </td>
                                    <td className={tdCls+` text-right font-medium ${real>0?"text-red-600":"text-gray-400"}`}>{real>0?fmt(real):"–"}</td>
                                    <td className={tdCls+` text-right font-bold ${over?"text-red-600":pct>80?"text-orange-600":"text-green-700"}`}>{est>0?pct.toFixed(1)+"%":"–"}</td>
                                    <td className={tdCls+` text-right font-semibold ${sel<0?"text-red-600":"text-green-700"}`}>{est>0?(sel>=0?"+ ":"")+fmt(sel):"–"}</td>
                                    <td className={tdCls}>
                                      <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                                        <div className="h-full rounded-full" style={{width:`${Math.min(pct,100)}%`,background:over?"#dc2626":pct>80?"#f97316":"#16a34a"}}/>
                                      </div>
                                      {over&&<div className="text-red-500 text-xs mt-0.5">+{(pct-100).toFixed(0)}% over!</div>}
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                            <tfoot>{(()=>{
                              const tE=EXPENSE_CATS.reduce((s,c)=>s+(estimates[c]||0),0),tR=EXPENSE_CATS.reduce((s,c)=>s+(catTotals[c]||0),0);
                              const tP=tE>0?(tR/tE*100):0,tS=tE-tR;
                              return(<tr style={{background:"#1a5c32"}}>
                                <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-white">TOTAL</td>
                                <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-green-200 text-right">{fmt(tE)}</td>
                                <td className="border border-gray-300 px-2 py-1.5 text-xs font-bold text-red-200 text-right">{fmt(tR)}</td>
                                <td className={`border border-gray-300 px-2 py-1.5 text-xs font-bold text-right ${tP>100?"text-red-300":tP>80?"text-orange-300":"text-cyan-200"}`}>{tP.toFixed(1)}%</td>
                                <td className={`border border-gray-300 px-2 py-1.5 text-xs font-bold text-right ${tS<0?"text-red-300":"text-green-200"}`}>{(tS>=0?"+ ":"")+fmt(tS)}</td>
                                <td className="border border-gray-300"/>
                              </tr>);
                            })()}</tfoot>
                          </table>
                        </div>
                      )
                  }
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
